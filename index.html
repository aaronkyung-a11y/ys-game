<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0f14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YS">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>YS Proto</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#0d0f14; overflow:hidden; font-family:-apple-system,system-ui,sans-serif; touch-action:none; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { background:#151a24; image-rendering:pixelated; display:block; }
  #hud { position:fixed; top:8px; left:0; right:0; text-align:center; color:#9fb0c8; font-size:12px; pointer-events:none; letter-spacing:.5px; }
  #hud b { color:#ffd36e; }
  /* touch controls */
  #stick { position:fixed; left:22px; bottom:26px; width:130px; height:130px; border-radius:50%;
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); touch-action:none; }
  #knob { position:absolute; left:35px; top:35px; width:60px; height:60px; border-radius:50%;
    background:rgba(159,176,200,.35); border:1px solid rgba(255,255,255,.25); }
  #btns { position:fixed; right:22px; bottom:30px; display:flex; gap:14px; align-items:flex-end; }
  .abtn { width:78px; height:78px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; color:#0d0f14; user-select:none; touch-action:none; }
  #atk { width:96px; height:96px; background:#ffd36e; box-shadow:0 4px 0 #b8964a; }
  #dash { background:#6ec1ff; box-shadow:0 4px 0 #3f7fb0; }
  .abtn:active { transform:translateY(3px); box-shadow:none; }
  #hint { position:fixed; bottom:130px; left:0; right:0; text-align:center; color:#5a6a82; font-size:11px; }
  @media (min-width:900px){ #stick,#btns{ opacity:.35 } }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hud">HP <b id="hp">100</b> · 남은 적 <b id="left">0</b> · <span id="ver">v0.23</span></div>
<div id="hint">PC: WASD 이동 · J 공격(연타=콤보) · K 대시 · 대시중 J=대시공격</div>

<div id="stick"><div id="knob"></div></div>
<div id="btns">
  <div id="dash" class="abtn">대시</div>
  <div id="atk" class="abtn">공격</div>
</div>

<script>
if ('serviceWorker' in navigator) {
  addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;
const HUD = { hp:document.getElementById('hp'), left:document.getElementById('left') };

// ---- world / camera ----
const W = 900, H = 600;              // logical world viewport
let scale = 1, ox = 0, oy = 0;
function resize(){
  const vw = innerWidth, vh = innerHeight;
  scale = Math.min(vw/W, vh/H);
  cv.width = W; cv.height = H;
  ctx.imageSmoothingEnabled = false;
  cv.style.width = (W*scale)+'px'; cv.style.height = (H*scale)+'px';
}
addEventListener('resize', resize); resize();

// ---- input ----
const keys = {};
addEventListener('keydown', e=>{ keys[e.key.toLowerCase()]=true; if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase()))e.preventDefault(); });
addEventListener('keyup',   e=>{ keys[e.key.toLowerCase()]=false; });

// virtual stick
let stickVec = {x:0,y:0};
const stick = document.getElementById('stick'), knob = document.getElementById('knob');
let stickId = null;
function stickMove(cx,cy){
  const r = stick.getBoundingClientRect();
  let dx = cx - (r.left+r.width/2), dy = cy - (r.top+r.height/2);
  const len = Math.hypot(dx,dy), max = r.width/2;
  if(len>max){ dx=dx/len*max; dy=dy/len*max; }
  knob.style.left = (35+dx)+'px'; knob.style.top = (35+dy)+'px';
  stickVec.x = dx/max; stickVec.y = dy/max;
}
function stickEnd(){ stickVec={x:0,y:0}; knob.style.left='35px'; knob.style.top='35px'; stickId=null; }
stick.addEventListener('touchstart',e=>{ e.preventDefault(); const t=e.changedTouches[0]; stickId=t.identifier; stickMove(t.clientX,t.clientY); });
stick.addEventListener('touchmove',e=>{ e.preventDefault(); for(const t of e.changedTouches) if(t.identifier===stickId) stickMove(t.clientX,t.clientY); });
stick.addEventListener('touchend',e=>{ for(const t of e.changedTouches) if(t.identifier===stickId) stickEnd(); });

let atkQueued=false, dashQueued=false;
const atkBtn=document.getElementById('atk'), dashBtn=document.getElementById('dash');
atkBtn.addEventListener('touchstart',e=>{e.preventDefault(); atkQueued=true;});
dashBtn.addEventListener('touchstart',e=>{e.preventDefault(); dashQueued=true;});
atkBtn.addEventListener('mousedown',()=>atkQueued=true);
dashBtn.addEventListener('mousedown',()=>dashQueued=true);

// ---- entities ----
const player = {
  x:1200, y:900, r:23, spd:5.0, hp:100, maxhp:100,
  fx:1, fy:0,               // facing
  fang:0,                   // smoothed facing angle (radians)
  breath:0,                 // idle breathing phase
  vx:0, vy:0,               // velocity (momentum)
  atkT:0, atkCd:0,          // attack anim timer / cooldown
  combo:0, comboWin:0,      // combo step (0-2) / input buffer window
  dashAtk:false,            // is current swing a dash attack
  dashAtkWin:0,             // grace frames after dash to still trigger dash-attack
  dashT:0, dashCd:0, iFr:0, // dash timer / cooldown / invuln frames
  hitFlash:0
};
let enemies = [], effects = [], bullets = [], orbs = [], popups = [], kills = 0, hitStop = 0, shake = 0;

// ---- world & camera ----
const WORLD = { w:2400, h:1800 };
const cam = { x:0, y:0 };
function updateCamera(){
  cam.x = player.x - W/2;
  cam.y = player.y - H/2;
  cam.x = Math.max(0, Math.min(WORLD.w - W, cam.x));
  cam.y = Math.max(0, Math.min(WORLD.h - H, cam.y));
}

// walls / obstacles (axis-aligned rects in world space)
const walls = [
  // border thickness so the field feels enclosed
  {x:0, y:0, w:WORLD.w, h:24}, {x:0, y:WORLD.h-24, w:WORLD.w, h:24},
  {x:0, y:0, w:24, h:WORLD.h}, {x:WORLD.w-24, y:0, w:24, h:WORLD.h},
  // interior structures — rooms & pillars
  {x:360, y:300, w:260, h:40}, {x:360, y:300, w:40, h:240},
  {x:1000, y:200, w:40, h:360},
  {x:1500, y:500, w:340, h:40},
  {x:700, y:820, w:40, h:420},
  {x:1150, y:1000, w:300, h:40}, {x:1410, y:1000, w:40, h:260},
  {x:1900, y:1150, w:40, h:420},
  {x:400, y:1300, w:360, h:40},
  {x:1000, y:1450, w:260, h:40},
  // pillars
  {x:560, y:640, w:70, h:70}, {x:1720, y:820, w:70, h:70},
  {x:980, y:640, w:70, h:70}, {x:1300, y:1250, w:70, h:70},
];
// resolve a circle (cx,cy,cr) against all walls, return corrected {x,y}
function collideWalls(cx, cy, cr){
  for(const w of walls){
    const nx = Math.max(w.x, Math.min(cx, w.x+w.w));
    const ny = Math.max(w.y, Math.min(cy, w.y+w.h));
    let dx = cx-nx, dy = cy-ny, d = Math.hypot(dx,dy);
    if(d < cr){
      if(d>0.0001){ cx = nx + dx/d*cr; cy = ny + dy/d*cr; }
      else { // center inside: push out along smallest axis
        const left=cx-w.x, right=w.x+w.w-cx, top=cy-w.y, bot=w.y+w.h-cy;
        const m=Math.min(left,right,top,bot);
        if(m===left)cx=w.x-cr; else if(m===right)cx=w.x+w.w+cr;
        else if(m===top)cy=w.y-cr; else cy=w.y+w.h+cr;
      }
    }
  }
  return {x:cx, y:cy};
}
function pointInWall(px,py){
  for(const w of walls) if(px>=w.x&&px<=w.x+w.w&&py>=w.y&&py<=w.y+w.h) return true;
  return false;
}

// Rendered as scaled blocky pixels; sprites face RIGHT and flip for left.

const HERO_CELL = 128; // each cell in the 512x512 sheet
const HERO_ROW = { idle:0, walk:1, attack:2, dash:3 };
const HERO_COL = { down:0, up:1, left:2, right:3 };
// draw the hero from the sheet at world (cx,cy); h = on-screen height in px; tint optional overlay
function drawHero(cx, cy, h, state, dir, tint){
  if(!heroSheetReady){ drawSprite('hero', cx, cy, h/20, dir==='left', tint); return; }
  const col = HERO_COL[dir] ?? 0, row = HERO_ROW[state] ?? 0;
  const sx = col*HERO_CELL, sy = row*HERO_CELL;
  const scale = h/HERO_CELL;
  const w = HERO_CELL*scale;
  const dx = Math.round(cx - w/2), dy = Math.round(cy - h/2);
  ctx.drawImage(HERO_SHEET, sx, sy, HERO_CELL, HERO_CELL, dx, dy, w, h);
  if(tint){
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = tint;
    ctx.fillRect(dx, dy, w, h);
    ctx.restore();
  }
}

function defSprite(name, palette, rows){ SPR[name] = { pal:palette, rows }; }

// draw a sprite centered at world (cx,cy); scale px per cell; flipX mirrors; tint overrides all opaque pixels
function drawSprite(name, cx, cy, scale, flipX, tint){
  const s = SPR[name]; if(!s) return;
  const n = s.rows.length; // 16
  const size = n*scale;
  const ox = cx - size/2, oy = cy - size/2;
  for(let ry=0; ry<n; ry++){
    const row = s.rows[ry];
    for(let rx=0; rx<row.length; rx++){
      const ch = row[rx];
      if(ch==='.'||ch===' ') continue;
      const col = tint || s.pal[ch];
      if(!col) continue;
      const dx = flipX ? (row.length-1-rx) : rx;
      ctx.fillStyle = col;
      ctx.fillRect(Math.floor(ox+dx*scale), Math.floor(oy+ry*scale), Math.ceil(scale), Math.ceil(scale));
    }
  }
}

// enemy archetypes
const ETYPE = {
  grunt:   { r:22, spd:2.0, hp:3, color:'#e05a5a', touch:6 },   // basic chaser
  charger: { r:26, spd:1.1, hp:4, color:'#e0913a', touch:10 },  // slow, then lunges
  shooter: { r:22, spd:1.0, hp:2, color:'#9a5ae0', touch:5 },   // keeps distance, fires
};
function makeEnemy(kind, x, y){
  const t = ETYPE[kind];
  return {
    kind, x, y, r:t.r, spd:t.spd, hp:t.hp, color:t.color, touch:t.touch,
    knx:0, kny:0, hitFlash:0, atkCd:0,
    state: kind==='shooter'?'cool':'approach', stateT: kind==='shooter'?60:0,
    chgVx:0, chgVy:0, aimX:0, aimY:0
  };
}
function randomOpenPos(minFromPlayer){
  for(let tries=0; tries<60; tries++){
    const x = 80+Math.random()*(WORLD.w-160), y = 80+Math.random()*(WORLD.h-160);
    if(pointInWall(x,y)) continue;
    if(minFromPlayer && Math.hypot(x-player.x, y-player.y) < minFromPlayer) continue;
    return {x,y};
  }
  return {x:WORLD.w/2, y:WORLD.h/2};
}
function populateWorld(){
  enemies = [];
  const plan = [];
  for(let i=0;i<14;i++) plan.push('grunt');
  for(let i=0;i<7;i++)  plan.push('charger');
  for(let i=0;i<5;i++)  plan.push('shooter');
  for(const kind of plan){
    const p = randomOpenPos(360); // don't spawn on top of the player
    enemies.push(makeEnemy(kind, p.x, p.y));
  }
}
populateWorld();

// ---- combat ----
const ATK_RANGE = 68, ATK_ARC = Math.PI*0.94, ATK_ACTIVE = 8, ATK_TOTAL = 16, ATK_CD = 4;
const TARGET_RANGE = 150; // auto-target acquisition radius
const COMBO_WINDOW = 20;  // frames after a swing to chain next hit
// per-combo-step feel: [total anim, active window, arc, range, dmg, knock, hitstop]
const COMBO = [
  { total:16, active:9, arc:Math.PI*1.4,  range:150, dmg:1, knock:14, hs:4 }, // 1st — wide sweep
  { total:15, active:9, arc:Math.PI*1.4,  range:158, dmg:2, knock:16, hs:5 }, // 2nd
  { total:24, active:12,arc:Math.PI*1.9,  range:185, dmg:4, knock:30, hs:9 }, // 3rd finisher (near-full circle)
];
// dash attack: long forward thrust, piercing, invulnerable — for punching THROUGH a group
const DASH_ATK = { total:20, active:14, arc:Math.PI*0.5, range:130, dmg:2, knock:22, hs:6 };
const DASH_SPD = 15, DASH_TIME = 11, DASH_CD = 22, DASH_IFR = 20;
// ---- movement feel tuning ----
const ACCEL = 0.28;      // how fast we reach target speed (higher = snappier)
const DECEL = 0.22;      // how fast we stop when input released (lower = more glide)
const TURN_RATE = 0.35;  // facing interpolation per frame (1 = instant snap)

function tryAttack(){
  // Dash attack: pressing attack during a dash OR shortly after → forward piercing thrust
  if(player.dashT>0 || player.dashAtkWin>0){
    player.dashAtk = true;
    player.sw = DASH_ATK;
    player.atkT = DASH_ATK.total;
    player.atkCd = DASH_ATK.total + ATK_CD;
    player.dashT = 0;        // convert dash into the attack
    player.dashAtkWin = 0;   // consume the grace window
    player.combo = 0; player.comboWin = 0;
    enemies.forEach(e=>e._hitThisSwing=false);
    return;
  }
  // Normal swing: blocked only if mid-swing outside the combo window
  if(player.atkT>0 && player.comboWin<=0) return;
  if(player.atkCd>0 && player.atkT<=0 && player.comboWin<=0) return;

  player.dashAtk = false;
  // advance combo step if within window, else reset to step 0
  if(player.comboWin>0){ player.combo = Math.min(player.combo+1, COMBO.length-1); }
  else { player.combo = 0; }

  // auto-target: snap facing toward nearest enemy within acquisition range
  let best=null, bestD=TARGET_RANGE;
  for(const e of enemies){
    if(e.hp<=0) continue;
    const d=Math.hypot(e.x-player.x, e.y-player.y);
    if(d<bestD){ bestD=d; best=e; }
  }
  if(best){
    const dx=best.x-player.x, dy=best.y-player.y, d=Math.hypot(dx,dy)||1;
    player.fx=dx/d; player.fy=dy/d;
  }
  const sw = COMBO[player.combo];
  player.sw = sw;
  player.atkT = sw.total;
  player.atkCd = sw.total + ATK_CD;
  player.comboWin = 0; // opens again when this swing's active window ends
  enemies.forEach(e=>e._hitThisSwing=false);
}
function tryDash(){
  if(player.dashCd>0) return;
  // dash commits instantly to the direction being held (no turn lag)
  let ix=0, iy=0;
  if(keys['w']||keys['arrowup'])iy-=1;
  if(keys['s']||keys['arrowdown'])iy+=1;
  if(keys['a']||keys['arrowleft'])ix-=1;
  if(keys['d']||keys['arrowright'])ix+=1;
  ix += stickVec.x; iy += stickVec.y;
  const il = Math.hypot(ix,iy);
  if(il>0.1){
    player.fx = ix/il; player.fy = iy/il;
    player.fang = Math.atan2(player.fy, player.fx);
  }
  player.dashT = DASH_TIME; player.dashCd = DASH_TIME + DASH_CD; player.iFr = DASH_IFR;
  player.dashAtkWin = DASH_TIME + 22; // stays open ~22 frames after dash ends
}

function update(){
  if(hitStop>0){ hitStop--; return; } // freeze frame

  // ---- movement input ----
  let ix=0, iy=0;
  if(keys['w']||keys['arrowup'])iy-=1;
  if(keys['s']||keys['arrowdown'])iy+=1;
  if(keys['a']||keys['arrowleft'])ix-=1;
  if(keys['d']||keys['arrowright'])ix+=1;
  ix += stickVec.x; iy += stickVec.y;
  const il = Math.hypot(ix,iy);
  if(il>1){ ix/=il; iy/=il; }
  player._moving = il>0.1;

  if(keys['j']) atkQueued=true;
  if(keys['k']) dashQueued=true;
  if(atkQueued){ tryAttack(); atkQueued=false; }
  if(dashQueued){ tryDash(); dashQueued=false; }

  // facing follows movement (not during attack) — smoothed turn
  if(il>0.1 && player.atkT<=0 && player.dashT<=0){
    const target = Math.atan2(iy, ix);
    let diff = target - player.fang;
    while(diff >  Math.PI) diff -= Math.PI*2;
    while(diff < -Math.PI) diff += Math.PI*2;
    player.fang += diff * TURN_RATE;
    player.fx = Math.cos(player.fang);
    player.fy = Math.sin(player.fang);
  }

  // ---- move ----
  if(player.dashT>0){
    // dash: strong impulse that eases out instead of constant slide
    const t = player.dashT/DASH_TIME;          // 1 -> 0
    const s = DASH_SPD * (0.45 + 0.55*t*t);    // fast at start, tapers
    player.vx = player.fx*s; player.vy = player.fy*s;
    player.dashT--;
    if(player.dashT===0){ player.vx *= 0.5; player.vy *= 0.5; } // carry a little out of the dash
  } else if(player.atkT>0){
    // committed swing, but a short forward lunge on the active frames
    const sw = player.sw || COMBO[player.combo];
    const activeFrom = sw.total - (sw.total-sw.active);
    if(player.atkT <= activeFrom && player.atkT > activeFrom - sw.active){
      const lunge = (player.dashAtk ? 3.2 : 1.5);
      player.vx += player.fx*lunge*0.35;
      player.vy += player.fy*lunge*0.35;
    }
    player.vx *= 0.80; player.vy *= 0.80;     // bleed off quickly while swinging
  } else {
    // walking: accelerate toward target velocity, decelerate when input released
    const tvx = ix*player.spd, tvy = iy*player.spd;
    const a = (il>0.1) ? ACCEL : DECEL;
    player.vx += (tvx - player.vx) * a;
    player.vy += (tvy - player.vy) * a;
    if(Math.abs(player.vx)<0.02) player.vx = 0;
    if(Math.abs(player.vy)<0.02) player.vy = 0;
  }
  player.x += player.vx; player.y += player.vy;
  player.x = Math.max(player.r, Math.min(WORLD.w-player.r, player.x));
  player.y = Math.max(player.r, Math.min(WORLD.h-player.r, player.y));
  ({x:player.x, y:player.y} = collideWalls(player.x, player.y, player.r));
  updateCamera();

  if(player.atkCd>0)player.atkCd--;
  if(player.dashCd>0)player.dashCd--;
  if(player.dashAtkWin>0)player.dashAtkWin--;
  if(player.iFr>0)player.iFr--;

  // breathing: slow when healthy, faster/heavier when hurt
  const hpFrac = player.hp/player.maxhp;
  player.breath += 0.055 + (1-hpFrac)*0.05;
  if(player.breath > Math.PI*2) player.breath -= Math.PI*2;
  if(player.hitFlash>0)player.hitFlash--;
  if(shake>0)shake*=0.85;

  if(player.dashAtk){
    player.iFr = Math.max(player.iFr, player.atkT); // invulnerable for the whole thrust
  }
  if(player.comboWin>0)player.comboWin--;

  // ---- attack hit detection (active window) ----
  if(player.atkT>0){
    const sw = player.sw;
    // dash attack lunges forward through the active window (punch through the group)
    if(player.dashAtk && player.atkT > sw.total-sw.active-4){
      player.x += player.fx*8; player.y += player.fy*8;
      player.x = Math.max(player.r, Math.min(WORLD.w-player.r, player.x));
      player.y = Math.max(player.r, Math.min(WORLD.h-player.r, player.y));
      ({x:player.x, y:player.y} = collideWalls(player.x, player.y, player.r));
      updateCamera();
    }
    player.atkT--;
    const activeFrom = sw.total-sw.active;
    if(player.atkT <= activeFrom && player.atkT > activeFrom-sw.active){
      const fang = Math.atan2(player.fy,player.fx);
      for(const e of enemies){
        if(e.hp<=0) continue;
        const dx=e.x-player.x, dy=e.y-player.y, d=Math.hypot(dx,dy);
        let hit=false;
        if(player.dashAtk){
          // dash attack: whole swept corridor — any enemy within a wide radius, no angle gate
          hit = d < sw.range*0.62 + e.r;
        } else {
          if(d < sw.range+e.r){
            const ang = Math.atan2(dy,dx);
            let da = Math.abs(((ang-fang+Math.PI*3)%(Math.PI*2))-Math.PI);
            hit = da < sw.arc/2;
          }
        }
        if(hit && !e._hitThisSwing){
            const ang = Math.atan2(dy,dx);
            e._hitThisSwing = true; // piercing: one hit per enemy per swing (incl. dash)
            e.hp-=sw.dmg; e.hitFlash=6;
            e.knx = dx/d*sw.knock; e.kny = dy/d*sw.knock;
            hitStop = sw.hs; shake = sw.hs+2;
            spawnHitFx(e.x,e.y,ang);
            popups.push({x:e.x, y:e.y-e.r-4, val:sw.dmg, t:32, vy:-0.8,
                         big: sw.dmg>=2});
            if(e.hp<=0){
              spawnDeathFx(e.x,e.y);
              if(Math.random()<0.16) orbs.push({x:e.x, y:e.y, r:7, t:600, heal:15, bob:Math.random()*6.28});
            }
        }
      }
    }
    if(player.atkT===0){
      // swing ended: open combo window (dash attack doesn't chain)
      player.comboWin = player.dashAtk ? 0 : COMBO_WINDOW;
      player.dashAtk = false;
      enemies.forEach(e=>e._hitThisSwing=false);
    }
  } else if(player.comboWin<=0){
    player.combo = 0;
    enemies.forEach(e=>e._hitThisSwing=false);
  }

  // ---- enemies ----
  enemies = enemies.filter(e=>e.hp>0);
  HUD.left.textContent = enemies.length;
  for(const e of enemies){
    // knockback overrides AI
    if(Math.abs(e.knx)>0.1||Math.abs(e.kny)>0.1){
      e.x+=e.knx; e.y+=e.kny; e.knx*=0.8; e.kny*=0.8;
    } else {
      const dx=player.x-e.x, dy=player.y-e.y, d=Math.hypot(dx,dy)||1;

      if(e.kind==='charger'){
        if(e.state==='charge'){
          e.x+=e.chgVx; e.y+=e.chgVy; e.stateT--;
          if(e.stateT<=0){ e.state='rest'; e.stateT=25; }
        } else if(e.state==='windup'){
          e.stateT--;
          if(e.stateT<=0){ // fire the lunge toward current player pos
            e.chgVx=dx/d*4.5; e.chgVy=dy/d*4.5; e.state='charge'; e.stateT=18;
          }
        } else if(e.state==='rest'){
          e.stateT--; if(e.stateT<=0) e.state='approach';
        } else { // approach until in range, then wind up
          e.x+=dx/d*e.spd; e.y+=dy/d*e.spd;
          if(d<220){ e.state='windup'; e.stateT=38; }
        }
      } else if(e.kind==='shooter'){
        if(e.state==='aim'){
          // stand still, telegraph, then fire
          e.stateT--;
          if(e.stateT<=0){
            bullets.push({x:e.x, y:e.y, vx:dx/d*2.1, vy:dy/d*2.1, r:5, t:260});
            e.state='cool'; e.stateT=110+Math.random()*40;
          }
        } else if(e.state==='cool'){
          // reposition to preferred distance while cooling down
          if(d<190){ e.x-=dx/d*e.spd*1.3; e.y-=dy/d*e.spd*1.3; }
          else if(d>300){ e.x+=dx/d*e.spd; e.y+=dy/d*e.spd; }
          e.stateT--;
          if(e.stateT<=0 && d<380){ e.state='aim'; e.stateT=40; e.aimX=player.x; e.aimY=player.y; }
        } else {
          e.state='cool'; e.stateT=60;
        }
      } else { // grunt
        e.x+=dx/d*e.spd; e.y+=dy/d*e.spd;
      }

      // contact damage (all types)
      if(d < e.r+player.r+2 && player.iFr<=0 && e.atkCd<=0){
        player.hp -= e.touch; player.hitFlash=10; player.iFr=20; e.atkCd=30;
        shake=8; HUD.hp.textContent=Math.max(0,player.hp);
        if(e.kind==='charger'&&e.state==='charge'){ e.state='rest'; e.stateT=25; }
        if(player.hp<=0) respawn();
      }
    }
    // wall collision + keep inside world
    e.x=Math.max(e.r,Math.min(WORLD.w-e.r,e.x)); e.y=Math.max(e.r,Math.min(WORLD.h-e.r,e.y));
    ({x:e.x, y:e.y} = collideWalls(e.x, e.y, e.r));
    if(e.atkCd>0)e.atkCd--;
    if(e.hitFlash>0)e.hitFlash--;
  }

  // ---- enemy bullets ----
  bullets = bullets.filter(b=>b.t>0);
  for(const b of bullets){
    b.x+=b.vx; b.y+=b.vy; b.t--;
    const dx=player.x-b.x, dy=player.y-b.y;
    if(Math.hypot(dx,dy) < b.r+player.r && player.iFr<=0){
      player.hp-=8; player.hitFlash=10; player.iFr=20; shake=8;
      HUD.hp.textContent=Math.max(0,player.hp); b.t=0;
      if(player.hp<=0) respawn();
    }
    if(b.x<0||b.x>WORLD.w||b.y<0||b.y>WORLD.h) b.t=0;
    else if(pointInWall(b.x,b.y)) b.t=0;
  }

  // ---- effects ----
  effects = effects.filter(f=>f.t>0);
  for(const f of effects){ f.t--; f.x+=f.vx||0; f.y+=f.vy||0; }

  // ---- health orbs ----
  orbs = orbs.filter(o=>o.t>0);
  for(const o of orbs){
    o.t--; o.bob+=0.15;
    const dx=player.x-o.x, dy=player.y-o.y, d=Math.hypot(dx,dy);
    if(d<70){ o.x+=dx/d*3.2; o.y+=dy/d*3.2; } // magnet toward player
    if(d < o.r+player.r){
      if(player.hp<player.maxhp){
        player.hp=Math.min(player.maxhp, player.hp+o.heal);
        HUD.hp.textContent=player.hp;
        popups.push({x:player.x, y:player.y-player.r-6, val:o.heal, t:36, vy:-0.9, heal:true});
        o.t=0;
      }
    }
  }

  // ---- damage/heal popups ----
  popups = popups.filter(p=>p.t>0);
  for(const p of popups){ p.t--; p.y+=p.vy; p.vy*=0.94; }
}

function respawn(){
  player.hp=player.maxhp; player.x=WORLD.w/2; player.y=WORLD.h/2; HUD.hp.textContent=player.hp;
  bullets=[]; orbs=[]; popups=[];
  populateWorld(); updateCamera();
}

function spawnHitFx(x,y,ang){
  for(let i=0;i<9;i++){
    const a=ang+(Math.random()-0.5)*1.4, s=3+Math.random()*4;
    effects.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,t:14,c:'#ffd36e',type:'spark'});
  }
}
function spawnDeathFx(x,y){
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3;
    effects.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,t:20,c:'#ff7a7a',type:'spark'});
  }
}

// ---- render ----
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  const sx=(Math.random()-0.5)*shake, sy=(Math.random()-0.5)*shake;
  ctx.translate(sx,sy);
  ctx.translate(-cam.x, -cam.y); // camera follows player

  // grid floor (only the visible slice of the world)
  ctx.strokeStyle='rgba(255,255,255,.03)'; ctx.lineWidth=1;
  const gx0=Math.floor(cam.x/45)*45, gy0=Math.floor(cam.y/45)*45;
  for(let gx=gx0; gx<=cam.x+W; gx+=45){ctx.beginPath();ctx.moveTo(gx,cam.y);ctx.lineTo(gx,cam.y+H);ctx.stroke();}
  for(let gy=gy0; gy<=cam.y+H; gy+=45){ctx.beginPath();ctx.moveTo(cam.x,gy);ctx.lineTo(cam.x+W,gy);ctx.stroke();}

  // walls
  for(const w of walls){
    // cull offscreen
    if(w.x+w.w<cam.x||w.x>cam.x+W||w.y+w.h<cam.y||w.y>cam.y+H) continue;
    ctx.fillStyle='#2a3446';
    ctx.fillRect(w.x, w.y, w.w, w.h);
    ctx.fillStyle='#39465c';
    ctx.fillRect(w.x, w.y, w.w, 4); // top highlight
    ctx.strokeStyle='#1b2230'; ctx.lineWidth=2;
    ctx.strokeRect(w.x, w.y, w.w, w.h);
  }

  // health orbs
  for(const o of orbs){
    const fade = o.t<80 ? o.t/80 : 1;           // blink out before expiring
    if(o.t<80 && (o.t%10<4)) continue;
    const yb = o.y + Math.sin(o.bob)*2;
    ctx.globalAlpha=fade;
    ctx.fillStyle='rgba(80,230,140,.25)';
    ctx.beginPath(); ctx.arc(o.x,yb,o.r+5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#4ce690';
    ctx.beginPath(); ctx.arc(o.x,yb,o.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0d3a20';
    ctx.fillRect(o.x-1,yb-4,2,8); ctx.fillRect(o.x-4,yb-1,8,2); // + cross
    ctx.globalAlpha=1;
  }

  // enemy bullets
  for(const b of bullets){
    ctx.fillStyle='#c77aff';
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(199,122,255,.35)';
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r+3,0,Math.PI*2); ctx.fill();
  }

  // enemies
  for(const e of enemies){
    // charger windup flash (telegraph the lunge) — big pulsing ring + aim line
    if(e.kind==='charger' && e.state==='windup'){
      const pulse = 0.4+0.6*Math.abs(Math.sin(e.stateT*0.35));
      ctx.strokeStyle=`rgba(255,150,50,${pulse})`;
      ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r+14,0,Math.PI*2); ctx.stroke();
      const adx=player.x-e.x, ady=player.y-e.y, al=Math.hypot(adx,ady)||1;
      ctx.strokeStyle=`rgba(255,120,40,${pulse*0.7})`; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(e.x,e.y);
      ctx.lineTo(e.x+adx/al*90, e.y+ady/al*90); ctx.stroke();
    }
    // shooter aim telegraph — line to locked aim point + growing dot
    if(e.kind==='shooter' && e.state==='aim'){
      const t=1-e.stateT/40;
      ctx.strokeStyle=`rgba(199,122,255,${0.25+0.5*t})`; ctx.lineWidth=2;
      ctx.setLineDash([6,6]);
      ctx.beginPath(); ctx.moveTo(e.x,e.y); ctx.lineTo(e.aimX,e.aimY); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle=`rgba(199,122,255,${0.4+0.5*t})`;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r+4+4*t,0,Math.PI*2); ctx.stroke();
    }
    // body sprite (flip to face the player); white tint on hit, orange tint mid-charge
    const facingLeft = (player.x - e.x) < 0;
    let tint = null;
    if(e.hitFlash>0) tint='#ffffff';
    else if(e.kind==='charger' && e.state==='charge') tint='#ffb84d';
    const escale = e.kind==='charger' ? 5.94 : 5.4;
    drawSprite(e.kind, e.x, e.y, escale, facingLeft, tint);
  }

  // attack visuals
  if(player.atkT>0 && player.sw){
    const sw=player.sw;
    const prog=1-(player.atkT/sw.total);
    if(player.dashAtk){
      // dash attack: filled radial burst showing the whole damage zone
      const rad = sw.range*0.62;
      const a = 0.30*Math.sin(prog*Math.PI);
      ctx.fillStyle=`rgba(110,193,255,${a})`;
      ctx.beginPath(); ctx.arc(player.x,player.y,rad,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle=`rgba(160,220,255,${0.4*Math.sin(prog*Math.PI)+0.2})`;
      ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(player.x,player.y,rad,0,Math.PI*2); ctx.stroke();
    } else {
      const fang=Math.atan2(player.fy,player.fx);
      ctx.save();
      ctx.translate(player.x,player.y); ctx.rotate(fang);
      const half = sw.arc/2;
      // eased sweep position (fast in the middle) — the blade's current angle
      const lead = -half + sw.arc*prog;
      // the visible arc trails behind the lead and shortens as the swing ends
      const tail = sw.arc*0.6;
      const a0 = Math.max(-half, lead - tail);
      const a1 = lead;
      const Rout = sw.range;                    // outer edge = hit range
      const Rin  = sw.range*0.42;               // inner edge (hollow crescent)
      const gold = player.combo>=2;
      // build the crescent band as a single path (outer arc forward, inner arc back)
      const seg = 14;
      ctx.beginPath();
      for(let i=0;i<=seg;i++){ const a=a0+(a1-a0)*i/seg; const x=Math.cos(a)*Rout, y=Math.sin(a)*Rout; i?ctx.lineTo(x,y):ctx.moveTo(x,y); }
      for(let i=seg;i>=0;i--){ const a=a0+(a1-a0)*i/seg; ctx.lineTo(Math.cos(a)*Rin, Math.sin(a)*Rin); }
      ctx.closePath();
      // radial-ish fill: brighter toward the leading edge via layered alpha
      const glow=Math.sin(prog*Math.PI);
      ctx.fillStyle = gold ? `rgba(255,220,140,${0.16*glow+0.05})` : `rgba(200,230,255,${0.16*glow+0.05})`;
      ctx.fill();
      // soft bright rim on the outer edge, fading to transparent at BOTH ends
      const g = ctx.createLinearGradient(Math.cos(a0)*Rout,Math.sin(a0)*Rout, Math.cos(a1)*Rout,Math.sin(a1)*Rout);
      g.addColorStop(0, 'rgba(255,255,255,0)');
      g.addColorStop(0.55, `rgba(255,255,255,${0.45*glow+0.1})`);
      g.addColorStop(0.85, `rgba(255,255,255,${0.5*glow+0.12})`);
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.strokeStyle=g; ctx.lineWidth = gold?10:7; ctx.lineCap='butt';
      ctx.beginPath();
      for(let i=0;i<=seg;i++){ const a=a0+(a1-a0)*i/seg; const x=Math.cos(a)*Rout, y=Math.sin(a)*Rout; i?ctx.lineTo(x,y):ctx.moveTo(x,y); }
      ctx.stroke();
      ctx.restore();
    }
  }

  // player
  if(!(player.hitFlash>0 && player.iFr>0 && (player.iFr%4<2))){ // blink when hurt
    // 4-way direction from facing vector (dominant axis)
    let dir;
    if(Math.abs(player.fx) >= Math.abs(player.fy)) dir = player.fx<0 ? 'left' : 'right';
    else dir = player.fy<0 ? 'up' : 'down';
    // state priority: attack > dash > walk > idle
    // NOTE: a dash-attack IS a swing — it must use the attack pose, not the dash pose.
    let state = 'idle';
    if(player.atkT>0) state = 'attack';
    else if(player.dashT>0) state = 'dash';
    else if(player._moving) state = 'walk';
    let tint = null;
    if(player.hitFlash>0) tint='#ffffff';
    else if(player.dashT>0 || player.dashAtk) tint='#bfe4ff';

    // idle breathing: gentle vertical squash/stretch so he isn't a statue
    let h = 124, yOff = 0;
    if(state==='idle'){
      const br = Math.sin(player.breath);      // -1..1
      h = 124 * (1 + br*0.018);                // ~2% chest rise
      yOff = -(h-124)/2 + br*0.9;              // keep feet planted, slight bob
    }
    drawHero(player.x, player.y + yOff, h, state, dir, tint);
  }

  // effects
  for(const f of effects){
    if(f.type==='spark'){
      ctx.globalAlpha=Math.min(1,f.t/12);
      ctx.fillStyle=f.c; ctx.fillRect(f.x-2,f.y-2,4,4);
      ctx.globalAlpha=1;
    }
  }

  // damage / heal popups
  ctx.textAlign='center';
  for(const p of popups){
    ctx.globalAlpha=Math.min(1,p.t/20);
    if(p.heal){ ctx.font='bold 15px system-ui'; ctx.fillStyle='#4ce690'; ctx.fillText('+'+p.val, p.x, p.y); }
    else { ctx.font=p.big?'bold 20px system-ui':'bold 15px system-ui';
           ctx.fillStyle=p.big?'#ffd36e':'#fff'; ctx.fillText(p.val, p.x, p.y); }
    ctx.globalAlpha=1;
  }
  ctx.textAlign='left';

  // player HP bar (above character)
  {
    const bw=40, bh=5, bx=player.x-bw/2, by=player.y-player.r-14;
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(bx-1,by-1,bw+2,bh+2);
    const frac=Math.max(0,player.hp/player.maxhp);
    ctx.fillStyle = frac>0.5?'#5ad06e':frac>0.25?'#e0c040':'#e05050';
    ctx.fillRect(bx,by,bw*frac,bh);
  }

  ctx.restore(); // end world transform

  // ---- minimap (screen space, top-right) ----
  {
    const mw=150, mh=mw*WORLD.h/WORLD.w, mx=W-mw-12, my=12, sc=mw/WORLD.w;
    ctx.fillStyle='rgba(10,14,20,.7)'; ctx.fillRect(mx-2,my-2,mw+4,mh+4);
    ctx.fillStyle='rgba(42,52,70,.9)';
    for(const w of walls) ctx.fillRect(mx+w.x*sc, my+w.y*sc, Math.max(1,w.w*sc), Math.max(1,w.h*sc));
    for(const e of enemies){
      ctx.fillStyle = e.kind==='charger'?'#e0913a':e.kind==='shooter'?'#9a5ae0':'#e05a5a';
      ctx.fillRect(mx+e.x*sc-1, my+e.y*sc-1, 2.5, 2.5);
    }
    ctx.fillStyle='#7ec7ff';
    ctx.fillRect(mx+player.x*sc-2, my+player.y*sc-2, 4, 4);
    // camera viewport box
    ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=1;
    ctx.strokeRect(mx+cam.x*sc, my+cam.y*sc, W*sc, H*sc);
  }

  // ---- cleared banner ----
  if(enemies.length===0){
    ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#ffd36e'; ctx.font='bold 44px system-ui';
    ctx.fillText('필드 클리어!', W/2, H/2-6);
    ctx.fillStyle='#cfe'; ctx.font='16px system-ui';
    ctx.fillText('모든 적을 처치했습니다', W/2, H/2+28);
    ctx.textAlign='left';
  }
}

// ---- loop ----
updateCamera();
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
